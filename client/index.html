<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pixel Basketball</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #334155;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      display: none;
    }

    /* Nickname overlay */
    #nickname-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(15, 23, 42, 0.97);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #nickname-overlay.hidden { display: none; }
    .nickname-box {
      text-align: center;
    }
    .nickname-box h2 {
      color: #FFD700;
      font-size: 32px;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .nickname-box h3 {
      color: #FFD700;
      font-size: 32px;
      margin-bottom: 32px;
      letter-spacing: 4px;
    }
    .nickname-box input {
      background: #1E293B;
      border: 2px solid #475569;
      color: #F8FAFC;
      font-family: monospace;
      font-size: 20px;
      padding: 10px 16px;
      text-align: center;
      width: 260px;
      outline: none;
      border-radius: 4px;
    }
    .nickname-box input:focus {
      border-color: #F97316;
    }
    .nickname-box input::placeholder {
      color: #64748B;
    }
    .nickname-error {
      color: #EF4444;
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }
    #nickname-ok {
      display: block;
      margin: 16px auto 0;
      background: #F97316;
      border: none;
      color: #FFF;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 48px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 2px;
    }
    #nickname-ok:hover { background: #EA580C; }
    #tournament-btn {
      display: block;
      margin: 8px auto 0;
      background: #8B5CF6;
      border: none;
      color: #FFF;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 32px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 2px;
    }
    #tournament-btn:hover { background: #7C3AED; }
    #leaderboard-btn {
      display: block;
      margin: 8px auto 0;
      background: transparent;
      border: 2px solid #475569;
      color: #94A3B8;
      font-family: monospace;
      font-size: 14px;
      padding: 8px 24px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 1px;
    }
    #leaderboard-btn:hover { border-color: #F97316; color: #F97316; }

    /* Leaderboard overlay */
    #leaderboard-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(15, 23, 42, 0.97);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #leaderboard-overlay.hidden { display: none; }
    .leaderboard-box {
      text-align: center;
      max-width: 600px;
      width: 90%;
    }
    .leaderboard-box h2 {
      color: #FFD700;
      font-size: 24px;
      margin-bottom: 16px;
      letter-spacing: 3px;
      font-family: monospace;
    }
    .leaderboard-tabs { margin-bottom: 12px; }
    .lb-tab {
      background: transparent;
      border: 2px solid #475569;
      color: #94A3B8;
      font-family: monospace;
      font-size: 14px;
      padding: 6px 20px;
      cursor: pointer;
      margin: 0 4px;
      border-radius: 4px;
    }
    .lb-tab.active {
      background: #F97316;
      border-color: #F97316;
      color: #FFF;
    }
    #leaderboard-content {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    #leaderboard-content table {
      width: 100%;
      border-collapse: collapse;
      font-family: monospace;
      color: #F8FAFC;
      font-size: 13px;
    }
    #leaderboard-content th {
      color: #FFD700;
      border-bottom: 1px solid #475569;
      padding: 6px 8px;
      text-align: left;
    }
    #leaderboard-content td {
      padding: 5px 8px;
      border-bottom: 1px solid #1E293B;
    }
    #leaderboard-close {
      background: #475569;
      border: none;
      color: #FFF;
      font-family: monospace;
      font-size: 16px;
      padding: 8px 32px;
      cursor: pointer;
      border-radius: 4px;
    }
    #leaderboard-close:hover { background: #64748B; }
  </style>
</head>
<body>
  <div id="nickname-overlay">
    <div class="nickname-box">
      <h2>PIXEL</h2>
      <h3>BASKETBALL</h3>
      <input id="nickname-input" type="text" maxlength="12" placeholder="Your nickname" autofocus>
      <div class="nickname-error" id="nickname-error"></div>
      <button id="nickname-ok">PLAY</button>
      <button id="tournament-btn">TOURNAMENT</button>
      <button id="leaderboard-btn">LEADERBOARD</button>
    </div>
  </div>
  <div id="leaderboard-overlay" class="hidden">
    <div class="leaderboard-box">
      <h2>TOURNAMENT LEADERBOARD</h2>
      <div class="leaderboard-tabs">
        <button id="lb-tab-wins" class="lb-tab active">BY WINS</button>
        <button id="lb-tab-points" class="lb-tab">BY POINTS</button>
      </div>
      <div id="leaderboard-content"></div>
      <button id="leaderboard-close">BACK</button>
    </div>
  </div>
  <canvas id="game"></canvas>
  <script src="bundle.js"></script>
</body>
</html>
